name: MIR-apptainer
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

# Common Apptainer runtime:
# - headless, GPU-capable base for DAIC and DelftBlue jobs
# - built once, then executed with `apptainer exec --nv`
# - mir-core is installed separately inside the image build

dependencies:
  # Python
  - python=3.10
  - pip>=23.0

  # Core scientific
  - numpy>=1.23.0,<2.0
  - scipy>=1.9.0
  - scikit-learn>=1.3.0
  - pandas>=1.5.0

  # numba / LLVM
  - numba>=0.57.0
  - llvmlite

  # Audio
  - librosa>=0.10.0
  - pysoundfile>=0.12.0
  - audioread>=3.0.0
  - resampy>=0.4.2
  - pydub>=0.25.1
  - ffmpeg
  - mir_eval>=0.7
  - pretty_midi
  - mido

  # Deep learning
  - pytorch>=2.0.0
  - torchaudio>=2.0.0
  - pytorch-cuda=12.4
  - pytorch-lightning>=2.1.0

  # Experiment tracking
  - tensorboard>=2.14.0

  # Utilities
  - tqdm>=4.65.0
  - joblib>=1.3.0
  - pyyaml
  - rich
  - click
  - wandb>=0.24.0

  # Build tools
  - cython>=0.29.0
  - setuptools>=69.0
  - wheel
  - antlr4-python3-runtime=4.9.3

  # DVC with S3 support
  - dvc
  - dvc-s3

  # Source-only / pip-only packages
  - pip:
      - "mirdata>=1.0.0"
      - "audiomentations>=0.33.0"
      - "git+https://github.com/Hashim-K/beatnet.git@v1.2.0"
      - "git+https://github.com/CPJKU/madmom.git"
