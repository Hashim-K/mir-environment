name: MIR-daic
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults

# ── DAIC-specific notes ───────────────────────────────────────────────────────
# Target nodes : A40 (gpu01-29), 48GB VRAM, CUDA 12.4
# No GUI packages — DAIC nodes are headless
# No jupyter — use DAIC's OnDemand portal or submit as batch jobs
# No audio hardware — no PyAudio, sounddevice, evdev
# PyTorch pinned to cu124 build to match DAIC driver stack
# Submit jobs to: #SBATCH --gres=gpu:a40:1 --partition=general
# ─────────────────────────────────────────────────────────────────────────────

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.10
  - pip>=23.0

  # ── Core scientific ───────────────────────────────────────────────────────
  - numpy>=1.23.0,<2.0
  - scipy>=1.9.0
  - scikit-learn>=1.3.0
  - pandas>=1.5.0

  # ── numba — MUST be conda-forge ───────────────────────────────────────────
  - numba>=0.57.0
  - llvmlite

  # ── Audio (no hardware deps) ──────────────────────────────────────────────
  - librosa>=0.10.0
  - pysoundfile>=0.12.0
  - audioread>=3.0.0
  - resampy>=0.4.2
  - pydub>=0.25.1
  - ffmpeg

  # ── Deep learning — pinned to CUDA 12.4 for A40 nodes ────────────────────
  - pytorch>=2.0.0
  - torchaudio>=2.0.0
  - pytorch-cuda=12.4
  - pytorch-lightning>=2.1.0

  # ── Experiment tracking (headless) ────────────────────────────────────────
  - tensorboard>=2.14.0

  # ── Utilities ─────────────────────────────────────────────────────────────
  - tqdm>=4.65.0
  - joblib>=1.3.0
  - pyyaml
  - rich
  - click

  # ── Build tools ───────────────────────────────────────────────────────────
  - cython>=0.29.0
  - setuptools>=69.0
  - wheel

  # ── DVC with S3 support ───────────────────────────────────────────────────
  - pip:
      - "dvc[s3]"

      # MIR-specific
      - "mir_eval>=0.7"
      - "mirdata>=1.0.0"
      - "pretty_midi"
      - "mido"
      - "audiomentations>=0.33.0"

      # BeatNet — from Hashim-K fork, no deps to avoid stale numba pin
      - "--no-deps git+https://github.com/Hashim-K/beatnet.git@v1.2.0"

      # madmom — from GitHub
      - "--no-deps git+https://github.com/CPJKU/madmom.git"

      # Experiment tracking
      - "wandb>=0.24.0"

      # mir-core — editable install
      # On DAIC, clone msc-thesis with submodules first, then this resolves
      - "-e ${MIR_CORE_PATH}"
